services:
  plotweb:
    build: .
    container_name: plotweb
    restart: unless-stopped
    ports:
      - "7919:3000"          # 7919 is prime
    volumes:
      - plotweb-data:/home/plotweb/data   # git-backed book repos + SQLite DB
    environment:
      - DIST_DIR=/home/plotweb/dist
      - DATA_DIR=/home/plotweb/data/books
      - DATABASE_URL=sqlite:/home/plotweb/data/plotweb.db
      - RESEND_API_KEY=re_Yn2z2YSQ_WmwGxTwKbZjPw6myR6dePXcd
      - APP_URL=https://pw.lostconnection.dev
      - RESEND_FROM=PlotWeb <plotweb@noreply.lostconnection.dev>

volumes:
  plotweb-data:
