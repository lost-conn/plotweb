<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlotWeb</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1b1e;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #c1c2c5;
            background: #1a1b1e;
            z-index: 10;
        }
        #loading h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; color: #fbbf24; }
        #loading p { font-size: 14px; color: #909296; }
    </style>
    <link data-trunk rel="rust" data-wasm-opt="z" />
</head>
<body>
    <div id="loading">
        <h1>PlotWeb</h1>
        <p>Loading...</p>
    </div>
    <script>
        const observer = new MutationObserver(() => {
            const root = document.getElementById('rinch-root');
            if (root && root.childNodes.length > 0) {
                const el = document.getElementById('loading');
                if (el) el.style.display = 'none';
                observer.disconnect();
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });
        setTimeout(() => {
            const el = document.getElementById('loading');
            if (el) el.style.display = 'none';
        }, 10000);
    </script>
</body>
</html>
